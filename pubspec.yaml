name: study_language
description: "Game học ngoại ngữ (tiếng Trung) kiểu Mario."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.5
  # Game engine (platformer hướng A)
  flame: ^1.18.0
  # Local storage (tiến độ học + SRS)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # Nội dung học (HSK 1-6) bundle sẵn cho bản dev (sau sẽ tải từ server).
  assets:
    - content/
